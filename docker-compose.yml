services:
  web:
    build: .
    container_name: flask_app
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      FLASK_SECRET_KEY: development-secret-key
    depends_on:
      - mysql
    volumes:
      - .:/app

  mysql:
    image: mysql:8.4
    container_name: mysql_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: activeloop
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
