<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Event - ActiveLoop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --accent-color: #4895ef;
            --light-color: #f8f9fa;
            --dark-color: #212529;
            --card-bg: rgba(255, 255, 255, 0.92);
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; }
        .card { border-radius: 15px; background: var(--card-bg); }
        .card-header { background: linear-gradient(to right, var(--primary-color), var(--secondary-color)); color: white; padding: 25px 20px; border-radius: 15px 15px 0 0; }
        .btn-primary { border-radius: 10px; }
        .footer { text-align: center; margin-top: 30px; color: rgba(255,255,255,0.8); font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, msg in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="card shadow-lg">
        <div class="card-header">
            <h2><i class="fas fa-edit me-2"></i>Edit Event</h2>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('edit_event', id=event.id) }}">
                <div class="mb-3">
                    <label for="name" class="form-label">Event Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ event.name }}" required>
                </div>

                <div class="mb-3">
                    <label for="location" class="form-label">Location (Town)</label>
                    <input type="text" class="form-control" id="location" name="location" value="{{ event.town }}" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="event_date" class="form-label">Event Date</label>
                        <input type="date" class="form-control" id="event_date" name="event_date" value="{{ event.date_only }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="event_time" class="form-label">Event Time</label>
                        <input type="time" class="form-control" id="event_time" name="event_time" value="{{ event.time_only }}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="event_type" class="form-label">Event Type</label>
                    <select class="form-select" id="event_type" name="event_type" required>
                        <option value="5km_run" {% if event.event_type == '5km_run' %}selected{% endif %}>5km Run</option>
                        <option value="5km_walk" {% if event.event_type == '5km_walk' %}selected{% endif %}>5km Walk</option>
                        <option value="cycling" {% if event.event_type == 'cycling' %}selected{% endif %}>Cycling</option>
                        <option value="other" {% if event.event_type == 'other' %}selected{% endif %}>Other</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="max_participants" class="form-label">Maximum Participants</label>
                    <input type="number" class="form-control" id="max_participants" name="max_participants"
                           value="{{ event.max_participants if event.max_participants else 50 }}" min="1" max="1000" required>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description (Optional)</label>
                    <textarea class="form-control" id="description" name="description" rows="4">{{ event.description if event.description }}</textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Save Changes</button>
                    <a href="{{ url_for('manage_events') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="footer">
    <p>&copy; 2025 ActiveLoop. All rights reserved.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
